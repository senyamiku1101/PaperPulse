name: Weekly Paper Update

on:
  schedule:
    - cron: '0 2 * * 1'    # 每周一 UTC 02:00
  workflow_dispatch:         # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/test_all.py -v

      - name: Run full update pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: python -m scripts.main --all

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "PaperPulse Bot"
          git add data/
          git diff-index --quiet HEAD || git commit -m "chore: weekly paper update $(date +%Y-%m-%d)"
          git push
